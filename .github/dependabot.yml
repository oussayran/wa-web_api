version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-development-dependencies:
        dependency-type: development
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: monthly
    open-pull-requests-limit: 2

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: monthly
    open-pull-requests-limit: 2

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
